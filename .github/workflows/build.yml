name: Build

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: "Override version (optional, e.g. 1.0.0)"
        required: false
        type: string

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-bun

      - name: Install dependencies
        run: bun install

      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            LATEST=$(npm view @legioncli/cli version 2>/dev/null || echo "")
            if [ -z "$LATEST" ]; then
              echo "No published version found, defaulting to 1.0.0"
              echo "version=1.0.0" >> "$GITHUB_OUTPUT"
            else
              echo "Latest published: $LATEST"
              IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST"
              echo "version=${MAJOR}.${MINOR}.$((PATCH+1))" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Setup Zig for Linux sandbox helpers
        run: |
          curl --fail --location --retry 3 \
            https://ziglang.org/download/0.14.0/zig-linux-x86_64-0.14.0.tar.xz \
            --output "$RUNNER_TEMP/zig.tar.xz"
          echo "473ec26806133cf4d1918caf1a410f8403a13d979726a9045b421b685031a982  $RUNNER_TEMP/zig.tar.xz" | sha256sum --check --status
          tar -xJf "$RUNNER_TEMP/zig.tar.xz" -C "$RUNNER_TEMP"
          echo "$RUNNER_TEMP/zig-linux-x86_64-0.14.0" >> "$GITHUB_PATH"

      - name: Build all platforms
        run: |
          cd packages/opencode
          bun run build
        env:
          KILO_VERSION: ${{ steps.version.outputs.version }}

      - name: Remove source maps
        run: find packages/opencode/dist -name "*.map" -delete

      - name: Print package sizes
        run: |
          for dir in packages/opencode/dist/@legioncli/cli-*/; do
            if [ -d "$dir" ]; then
              PKG_NAME=$(cat "$dir/package.json" | grep '"name"' | head -1 | sed 's/.*: *"//;s/".*//')
              SIZE=$(du -sh "$dir" | cut -f1)
              echo "  $PKG_NAME: $SIZE"
            fi
          done

      - name: Upload platform packages
        uses: actions/upload-artifact@v4
        with:
          name: npm-packages
          path: packages/opencode/dist/@legioncli/cli-*/
          retention-days: 30

      - name: Upload main package directory
        run: |
          mkdir -p packages/opencode/dist/@legioncli/cli
          cp -r packages/opencode/bin packages/opencode/dist/@legioncli/cli/bin
          cp packages/opencode/script/postinstall.mjs packages/opencode/dist/@legioncli/cli/postinstall.mjs
          cp LICENSE packages/opencode/dist/@legioncli/cli/LICENSE
          cp packages/opencode/README.md packages/opencode/dist/@legioncli/cli/README.md

          VERSION=$(cat packages/opencode/dist/@legioncli/cli-linux-x64/package.json | grep '"version"' | head -1 | sed 's/.*: *"//;s/".*//')

          OPTIONAL_DEPS="{}"
          for dir in packages/opencode/dist/@legioncli/cli-*/; do
            if [ -d "$dir" ]; then
              PLATFORM_NAME=$(cat "$dir/package.json" | grep '"name"' | head -1 | sed 's/.*: *"//;s/".*//')
              OPTIONAL_DEPS=$(echo "$OPTIONAL_DEPS" | node -e "
                const fs = require('fs');
                const data = JSON.parse(fs.readFileSync('/dev/stdin', 'utf8'));
                data['$PLATFORM_NAME'] = '$VERSION';
                console.log(JSON.stringify(data));
              ")
            fi
          done

          node -e "
            const fs = require('fs');
            const pkg = {
              name: '@legioncli/cli',
              version: '$VERSION',
              bin: {
                legion: './bin/legion',
                legioncli: './bin/legion'
              },
              scripts: {
                postinstall: 'node ./postinstall.mjs'
              },
              license: 'MIT',
              repository: {
                type: 'git',
                url: 'https://github.com/preetbiswas12/Blitz'
              },
              os: ['darwin', 'linux', 'win32'],
              cpu: ['arm64', 'x64'],
              private: false,
              optionalDependencies: JSON.parse(process.argv[1])
            };
            fs.writeFileSync('packages/opencode/dist/@legioncli/cli/package.json', JSON.stringify(pkg, null, 2));
          " "$OPTIONAL_DEPS"

          echo "Main package.json:"
          cat packages/opencode/dist/@legioncli/cli/package.json

      - name: Upload main package
        uses: actions/upload-artifact@v4
        with:
          name: npm-main-package
          path: packages/opencode/dist/@legioncli/cli/
          retention-days: 30

      - name: Print publish instructions
        run: |
          VERSION=$(cat packages/opencode/dist/@legioncli/cli-linux-x64/package.json | grep '"version"' | head -1 | sed 's/.*: *"//;s/".*//')
          echo ""
          echo "============================================"
          echo "  Build complete! Version: $VERSION"
          echo "============================================"
          echo ""
          echo "Download artifacts from this run, then publish with:"
          echo ""
          echo "  # Publish platform packages first (wait 5 min between each)"
          echo "  for dir in cli-*/; do"
          echo "    cd \$dir && npm publish --access public && cd - && sleep 300"
          echo "  done"
          echo ""
          echo "  # Then publish the main package"
          echo "  cd @legioncli/cli && npm publish --access public"
          echo ""