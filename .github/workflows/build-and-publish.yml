name: Build and Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: false
        type: choice
        options:
          - patch
          - minor
          - major
      version:
        description: "Override version (optional, e.g. 1.0.0)"
        required: false
        type: string

permissions:
  id-token: write
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-bun

      - name: Install dependencies
        run: bun install

      - name: Setup Zig for Linux sandbox helpers
        run: |
          curl --fail --location --retry 3 \
            https://ziglang.org/download/0.14.0/zig-linux-x86_64-0.14.0.tar.xz \
            --output "$RUNNER_TEMP/zig.tar.xz"
          echo "473ec26806133cf4d1918caf1a410f8403a13d979726a9045b421b685031a982  $RUNNER_TEMP/zig.tar.xz" | sha256sum --check --status
          tar -xJf "$RUNNER_TEMP/zig.tar.xz" -C "$RUNNER_TEMP"
          echo "$RUNNER_TEMP/zig-linux-x86_64-0.14.0" >> "$GITHUB_PATH"

      - name: Build all platforms
        run: |
          cd packages/opencode
          bun run build
        env:
          KILO_VERSION: ${{ inputs.version }}
          KILO_BUMP: ${{ inputs.bump || 'patch' }}

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Create main package
        working-directory: packages/opencode
        run: |
          mkdir -p dist/@legioncli
          cp -r bin dist/@legioncli/bin
          cp script/postinstall.mjs dist/@legioncli/postinstall.mjs
          cp ../../LICENSE dist/@legioncli/LICENSE
          cp README.md dist/@legioncli/README.md

          VERSION=$(cat dist/@legioncli-linux-x64/package.json | grep '"version"' | head -1 | sed 's/.*: *"//;s/".*//')

          cat > dist/@legioncli/package.json << EOF
          {
            "name": "@legioncli",
            "version": "$VERSION",
            "bin": {
              "legion": "./bin/legion",
              "legioncli": "./bin/legion"
            },
            "scripts": {
              "postinstall": "node ./postinstall.mjs"
            },
            "license": "MIT",
            "os": ["darwin", "linux", "win32"],
            "cpu": ["arm64", "x64"],
            "private": false
          }
          EOF

      - name: Publish platform packages
        working-directory: packages/opencode
        run: |
          for dir in dist/@legioncli-*/; do
            if [ -d "$dir" ]; then
              echo "Publishing $dir"
              cd "$dir"
              npm publish --access public --provenance || echo "Warning: failed to publish $dir"
              cd -
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish main package
        working-directory: packages/opencode/dist/@legioncli
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
