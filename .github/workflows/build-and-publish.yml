name: Build and Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: false
        type: choice
        options:
          - patch
          - minor
          - major
      version:
        description: "Override version (optional, e.g. 1.0.0)"
        required: false
        type: string

permissions:
  id-token: write
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-bun

      - name: Install dependencies
        run: bun install

      - name: Setup Zig for Linux sandbox helpers
        run: |
          curl --fail --location --retry 3 \
            https://ziglang.org/download/0.14.0/zig-linux-x86_64-0.14.0.tar.xz \
            --output "$RUNNER_TEMP/zig.tar.xz"
          echo "473ec26806133cf4d1918caf1a410f8403a13d979726a9045b421b685031a982  $RUNNER_TEMP/zig.tar.xz" | sha256sum --check --status
          tar -xJf "$RUNNER_TEMP/zig.tar.xz" -C "$RUNNER_TEMP"
          echo "$RUNNER_TEMP/zig-linux-x86_64-0.14.0" >> "$GITHUB_PATH"

      - name: Build all platforms
        run: |
          cd packages/opencode
          bun run build
        env:
          KILO_VERSION: ${{ inputs.version }}
          KILO_BUMP: ${{ inputs.bump || 'patch' }}
          GH_TOKEN: ${{ github.token }}

      - name: Upload platform artifacts
        uses: actions/upload-artifact@v4
        with:
          name: platform-packages
          path: packages/opencode/dist/@legioncli-*/
          retention-days: 5

      - name: Upload main package
        uses: actions/upload-artifact@v4
        with:
          name: main-package
          path: |
            packages/opencode/dist/@legioncli/
            !packages/opencode/dist/@legioncli/**/*.map
          retention-days: 5

  publish:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Download platform packages
        uses: actions/download-artifact@v4
        with:
          name: platform-packages
          path: dist-platforms

      - name: Download main package
        uses: actions/download-artifact@v4
        with:
          name: main-package
          path: dist-main

      - name: Publish platform packages
        run: |
          for dir in dist-platforms/@legioncli-*/; do
            if [ -d "$dir" ]; then
              echo "Publishing $dir"
              cd "$dir"
              npm publish --access public --provenance || echo "Failed to publish $dir"
              cd -
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish main package
        run: |
          cd dist-main/@legioncli
          npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
